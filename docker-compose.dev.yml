# version: '3.9'
services:
  postgres:
    image: postgres:16
    container_name: gym_postgres_dev
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: gym_redis_dev
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD}

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: gym_backend_dev
    restart: on-failure
    working_dir: /usr/src/app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DATABASE_URL=${DATABASE_URL}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_URL=${REDIS_URL}
    depends_on:
      - redis
      - postgres
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
    command: ["npm","run", "dev"]

  frontend-admin:
    build:
      context: ./frontend-admin
      dockerfile: Dockerfile.dev 
    container_name: gym_frontend_admin_dev
    restart: on-failure
    working_dir: /app
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
    volumes:
      - ./frontend-admin:/app
      - /app/node_modules
    depends_on:
      - backend

  frontend-user:
    build:
      context: ./frontend-user-next
      dockerfile: Dockerfile.dev 
    container_name: gym_frontend_user_dev
    restart: on-failure
    working_dir: /app
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=development
    volumes:
      - ./frontend-user-next:/app
      - /app/node_modules
    command: ["npm","run","dev"]
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data: