events {
    worker_connections 1024;
    # Số lượng kết nối tối đa mỗi worker process có thể xử lý
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream; 
    # Load danh sách MIME types (để nginx biết file .js, .css là gì)
    # Nếu không xác định được type thì dùng mặc định 

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Bật gzip để giảm dung lượng response (tăng tốc web)
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    upstream backend {
        server backend:3000; # container backend chạy port 3000
    }

    upstream frontend_admin {
        server frontend-admin:5173;
    }

    upstream frontend_user {
        server frontend-user:3000;
    }

    # Server HTTP (port 80) → redirect sang HTTPS
    server {
        listen 80;
        server_name 54.169.157.109.nip.io;
        return 301 https://$host$request_uri;
    }
    # Server HTTPS chính
    server {
        listen 443 ssl;
        server_name 54.169.157.109.nip.io;

         # SSL certificate (HTTPS)
        ssl_certificate /etc/ssl/certs/gym.crt;
        ssl_certificate_key /etc/ssl/private/gym.key;

        # Backend API routes
        location /api/ {
            # Forward request tới backend
            proxy_pass http://backend;

            # Forward header để backend biết request gốc
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeout
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 120s;
        }

        # Admin frontend
        location /admin/ {
            proxy_pass http://frontend_admin/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 120s;
        }

        # User frontend (default)
        location / {
            proxy_pass http://frontend_user;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 120s;
        }
    }

}