services:
  postgres:
    image: postgres:16
    container_name: gym_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: gym_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: gym_backend
    restart: always
    ports:
      - "3000:3000"
    env_file:
    - ./backend/.env
    depends_on:
      - postgres
      - redis

  frontend-admin:
    build:
      context: ./frontend-admin
      dockerfile: Dockerfile
    container_name: gym_frontend_admin
    restart: always
    ports:
      - "5173:5173"
    env_file:
      - ./frontend-admin/.env
    depends_on:
      - backend

  frontend-user:
    build:
      context: ./frontend-user-next
      dockerfile: Dockerfile
    container_name: gym_frontend_user
    restart: always
    ports:
      - "3001:3000"
    env_file:
      - ./frontend-user-next/.env
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data: