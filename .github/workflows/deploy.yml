name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    
    runs-on: ubuntu-latest

    steps:
      # 1. Lấy code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Login Docker Hub
      - name: Login Docker
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3. Build & Push Backend
      - name: Backend
        run: |
          docker build -t namphong134/gym-backend:latest ./backend 
          docker push namphong134/gym-backend:latest

      # 4. Frontend User
      - name: Frontend User
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_BASE_URL=${{ secrets.NEXT_PUBLIC_API_BASE_URL }} \
            -t namphong134/gym-frontend-user:latest ./frontend-user-next
          docker push namphong134/gym-frontend-user:latest

      # 5. Frontend Admin
      - name: Frontend Admin
        run: |
          docker build \
            --build-arg VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }} \
            -t namphong134/gym-frontend-admin:latest ./frontend-admin
          docker push namphong134/gym-frontend-admin:latest

      # 6. SSH EC2 để deploy
      - name: Deploy EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/gym-management
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d